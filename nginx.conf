server {
    listen 80;
    server_name rhythmofleaders.pro www.rhythmofleaders.pro;

    # ──────────────────────────────────────────────
    # API → trimite catre backend Express (port 4000)
    # ──────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ──────────────────────────────────────────────
    # Frontend → fisierele statice din dist/
    # ──────────────────────────────────────────────
    root /var/www/rhythmofleaders/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache pentru assets (JS/CSS/imagini)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Ascunde fisierele .env si alte fisiere sensibile
    location ~ /\. {
        deny all;
    }
}
